<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مناسف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <img src="https://c.top4top.io/p_37838ly851.png" alt="شعار" class="logo">
            <h1>تطبيق مناسف</h1>
        </div>
        <p class="header-desc">اجمل المناسف يقدمها لك متجر مناسف لتزين بها مائدتك وبأنسب الاسعار</p>
    </header>

    <main class="app-content">
        
        <section id="home-tab" class="tab-content active">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="ابحث عن وجبتك المفضلة...">
            </div>
            
            <div class="categories">
                <button class="cat-btn active">الكل</button>
                <button class="cat-btn">مناسف لحم</button>
                <button class="cat-btn">مناسف دجاج</button>
                <button class="cat-btn">إضافات</button>
            </div>

            <div class="products-grid" id="products-list">
                </div>
        </section>

        <section id="cart-tab" class="tab-content">
            <h2 class="section-title">سلة الطلبات</h2>
            <div id="cart-items-container" class="cart-items">
                <p class="empty-cart">السلة فارغة حالياً</p>
            </div>
            <div class="cart-summary">
                <div class="total-row">
                    <span>الإجمالي:</span>
                    <span id="cart-total-price">0 د.أ</span>
                </div>
                <button class="checkout-btn" onclick="checkoutWhatsApp()">إتمام الطلب <i class="fab fa-whatsapp"></i></button>
            </div>
        </section>

        <section id="profile-tab" class="tab-content">
            <div class="profile-header">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <h3>أهلاً بك، زبوننا الكريم</h3>
                <p>079XXXXXXX</p>
            </div>
            <ul class="profile-menu">
                <li><i class="fas fa-list-alt"></i> طلباتي السابقة</li>
                <li><i class="fas fa-cog"></i> الإعدادات</li>
                <li><i class="fas fa-headset"></i> المساعدة والدعم</li>
                <li class="logout"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</li>
            </ul>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="switchTab('profile', this)">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </button>
        <button class="nav-item active" onclick="switchTab('home', this)">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </button>
        <button class="nav-item" onclick="switchTab('cart', this)">
            <div class="cart-icon-wrapper">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-badge" class="badge">0</span>
            </div>
            <span>السلة</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
